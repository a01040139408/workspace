<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 문자 인코딩 설정 -->
    <meta charset="UTF-8">
    <!-- 모바일 화면 크기에 맞게 페이지가 조정되도록 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울의 닭 : 치킨 지도</title> <!-- 웹사이트 제목 -->

    <!-- 구글 웹폰트 Noto Sans KR 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- 구글 서버 연결 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- 크로스 오리진 요청 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet"> <!-- Noto Sans KR 폰트 추가 -->

    <style>
        html {
                overflow-y: scroll; /* 항상 세로 스크롤바를 표시 */
        }

        /* 전체 페이지 스타일 */
        body {
            font-family: 'Noto Sans KR', sans-serif; /* 폰트 설정 */
            margin: 0; /* 기본 여백 제거 */
            padding: 0; /* 기본 패딩 제거 */
            background-color: #161616; /* 배경색 설정 */
            color: #ffffff; /* 텍스트 색상 설정 */
        }

        /* 전체 헤더 스타일 */
        header {
            display: flex;
            justify-content: center; /* 로고를 가운데로 */
            align-items: center; /* 세로 정렬 */
            padding: 100px 0 0 0; /* 상단 여백 */
            position: relative;
        }

        /* 메뉴 컨테이너 (로고와 메뉴를 감싸는 요소) */
        .menu-container {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 로고를 중앙에 두고 좌우 메뉴 배치 */
            width: 80%; /* 전체 너비를 조정 */
            max-width: 1200px; /* 최대 너비 설정 */
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 로고 스타일 */
        .logo {
            width: 200px;
            height: auto;
            margin: 0 30px 0 60px; /* 좌우 여백 추가 */
        }

        /* 왼쪽 & 오른쪽 메뉴 스타일 */
        .menu-left, .menu-right {
            display: flex;
            gap: 15px;
        }

        /* 메뉴 항목 스타일 */
        .menu-left a, .menu-right a {
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 0px;
            transition: color 0.3s ease-in-out; /* 부드러운 색상 전환 */
        }

        /* 메뉴 항목에 마우스를 올렸을 때 색상 변경 */
        .menu-left a:hover, .menu-right a:hover {
            color: #ff5800 !important;
        }

        /* 클릭된 링크 (active 상태) 스타일 */
        .menu-left a:active, .menu-right a:active {
            text-decoration: none; /* 클릭 시 밑줄 제거 */
            color: #ffffff; /* 텍스트 색상 유지 */
        }

        /* 방문한 링크 (visited 상태) 스타일 */
        .menu-left a:visited, .menu-right a:visited {
            text-decoration: none; /* 방문한 링크 밑줄 제거 */
            color: #ffffff; /* 텍스트 색상 유지 */
        }

        /* 섹션 제목 스타일 */
        .section-title {
            margin: 60px 0 0 -20px; /* 위쪽, 아래쪽 여백 */
            text-align: center; /* 가운데 정렬 */
            font-size: 30px; /* 글자 크기 */
            font-weight: bold; /* 글자 굵게 */
        }

        /* 개별 위치 지정 */
        .title-1 {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
        }

        /* 지도 섹션 스타일 */
        .map {
            display: flex; /* flexbox로 정렬 */
            justify-content: center; /* 가운데 정렬 */
            margin-top: 150px; /* 위쪽 여백 */
            margin-bottom: 20px; /* 아래쪽 여백 */
        }

        /* 지도 iframe 스타일 */
        .map iframe {
            width: 100%; /* 너비 90% */
            max-width: 1600px; /* 최대 너비 1200px */
            height: 900px; /* 높이 800px */
            border: none; /* 테두리 없애기 */
        }
    </style>
</head>
<body>
   <header>
    <!-- 왼쪽 메뉴 (로고의 왼쪽) -->
    <div class="menu-left">
        <a href="map.html">치킨 지도</a>
        <a href="recommend.html">치킨 순위</a>
    </div>

    <!-- 로고 (가운데) -->
        <a href="index.html"><img src="static/schick_logo_temp_200.png" alt="로고" class="logo"> <!-- 로고 이미지 -->

    <!-- 오른쪽 메뉴 (로고의 오른쪽) -->
    <div class="menu-right">
        <a href="about.html">치킨 게임</a>
        <a href="about.html">서울의닭 소개</a>
    </div>
    </header>
    <!-- 치카 지도 제목 -->
    <!-- 첫 번째 제목 -->
    <div class="section-title title-1">서울특별시 치킨집 분포 지도</div>

    <!-- 지도 iframe 섹션 -->
    <section class="map">
        <!-- 지도 파일을 iframe으로 로드하여 표시합니다. -->
        <iframe src="seoul_business_map_공유용.html" title="치카 지도"></iframe>
    </section>
</body>
</html>
