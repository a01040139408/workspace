<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 문자 인코딩 설정 -->
    <meta charset="UTF-8">
    <!-- 모바일 화면 크기에 맞게 페이지가 조정되도록 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울의 닭 : 치킨 순위</title> <!-- 웹사이트 제목 -->

    <!-- 구글 웹폰트 Noto Sans KR 추가 -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- 구글 서버 연결 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- 크로스 오리진 요청 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet"> <!-- Noto Sans KR 폰트 추가 -->

    <style>
        html {
                overflow-y: scroll; /* 항상 세로 스크롤바를 표시 */
        }

        /* 전체 페이지 스타일 */
        body {
            font-family: 'Noto Sans KR', sans-serif; /* 폰트 설정 */
            margin: 0; /* 기본 여백 제거 */
            padding: 0; /* 기본 패딩 제거 */
            background-color: #161616; /* 배경색 설정 */
            color: #lelele; /* 텍스트 색상 설정 */
        }

        /* 전체 헤더 스타일 */
        header {
            display: flex;
            justify-content: center; /* 로고를 가운데로 */
            align-items: center; /* 세로 정렬 */
            padding: 100px 0 0 0; /* 상단 여백 */
            position: relative;
        }

        /* 메뉴 컨테이너 (로고와 메뉴를 감싸는 요소) */
        .menu-container {
            display: flex;
            align-items: center;
            justify-content: space-between; /* 로고를 중앙에 두고 좌우 메뉴 배치 */
            width: 80%; /* 전체 너비를 조정 */
            max-width: 1200px; /* 최대 너비 설정 */
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 로고 스타일 */
        .logo {
            width: 200px;
            height: auto;
            margin: 0 30px 0 60px; /* 좌우 여백 추가 */
        }

        /* 왼쪽 & 오른쪽 메뉴 스타일 */
        .menu-left, .menu-right {
            display: flex;
            gap: 15px;
        }

        /* 메뉴 항목 스타일 */
        .menu-left a, .menu-right a {
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 0px;
            transition: color 0.3s ease-in-out; /* 부드러운 색상 전환 */
        }

        /* 메뉴 항목에 마우스를 올렸을 때 색상 변경 */
        .menu-left a:hover, .menu-right a:hover {
            color: #ff5800 !important;
        }

        /* 클릭된 링크 (active 상태) 스타일 */
        .menu-left a:active, .menu-right a:active {
            text-decoration: none; /* 클릭 시 밑줄 제거 */
            color: #ffffff; /* 텍스트 색상 유지 */
        }

        /* 방문한 링크 (visited 상태) 스타일 */
        .menu-left a:visited, .menu-right a:visited {
            text-decoration: none; /* 방문한 링크 밑줄 제거 */
            color: #ffffff; /* 텍스트 색상 유지 */
        }

        h1 {
            color: #d35400;
        }
        .ranking-container {
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .ranking {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 30%;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
   <header>
    <!-- 왼쪽 메뉴 (로고의 왼쪽) -->
    <div class="menu-left">
        <a href="map.html">치킨 지도</a>
        <a href="recommend.html">치킨 순위</a>
    </div>

    <!-- 로고 (가운데) -->
        <a href="index.html"><img src="static/schick_logo_temp_200.png" alt="로고" class="logo"> <!-- 로고 이미지 -->

    <!-- 오른쪽 메뉴 (로고의 오른쪽) -->
    <div class="menu-right">
        <a href="about.html">치킨 게임</a>
        <a href="about.html">서울의닭 소개</a>
    </div>
    </header>

    <h1>치킨 순위</h1>
    <div class="ranking-container">
        <div class="ranking" id="fried-chicken">
            <h2>후라이드 치킨 순위</h2>
            <ul></ul>
        </div>
        <div class="ranking" id="yangnyeom-chicken">
            <h2>양념 치킨 순위</h2>
            <ul></ul>
        </div>
        <div class="ranking" id="overall-chicken">
            <h2>전체 치킨 순위</h2>
            <ul></ul>
        </div>
    </div>

    <script>
        const friedChickenRankings = [
            "1. 황금 올리브치킨(BBQ)", "2. 후라이드(BHC)", "3. 리얼 후라이드(교촌)",
            "4. 엄청 큰 후라이드(노랑통닭)", "5. 후라이드 치킨(맘스터치)", "6. 뼈후라이드 치킨(60계치킨)",
            "7. 후라이드(멕시카나) 1989후라이드X", "8. 씬후라이드(푸라닭)", "9. 후라이드 치킨(네네치킨)", "10. 후라이드(자담치킨)"
        ];
        
        const yangnyeomChickenRankings = [
            "1. 레드콤보(교촌치킨)", "2. BBQ 양념치킨", "3. 네네치킨 청양마요치킨",
            "4. 처갓집양념치킨 슈프림양념치킨", "5. 페리카나 양념치킨", "6. BHC 뿌링클",
            "7. 노랑통닭 양념치킨", "8. 멕시카나 양념치킨", "9. 굽네치킨 볼케이노", "10. 호식이두마리치킨 양념치킨"
        ];
        
        const overallChickenRankings = [
            "1. 황금올리브치킨 (BBQ)", "2. 레드콤보 (교촌치킨)", "3. BHC 후라이드",
            "4. BHC 뿌링클", "5. BBQ 양념치킨", "6. 네네치킨 청양마요치킨",
            "7. 교촌 리얼 후라이드", "8. 굽네치킨 볼케이노", "9. 노랑통닭 엄청 큰 후라이드", "10. 처갓집 슈프림양념치킨"
        ];

        function displayRankings(id, rankings) {
            const list = document.querySelector(`#${id} ul`);
            rankings.forEach(rank => {
                const li = document.createElement("li");
                li.textContent = rank;
                list.appendChild(li);
            });
        }

        displayRankings("fried-chicken", friedChickenRankings);
        displayRankings("yangnyeom-chicken", yangnyeomChickenRankings);
        displayRankings("overall-chicken", overallChickenRankings);
    </script>
</body>
</html>
