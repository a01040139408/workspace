<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울의 닭 - Seoul's Chicken</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #161616;
            color: #ffffff;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 0 0 0;
            position: relative;
        }

        .menu-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 80%;
            max-width: 1200px;
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .logo {
            width: 200px;
            height: auto;
            margin: 0 30px 0 60px;
        }

        .menu-left, .menu-right {
            display: flex;
            gap: 15px;
        }

        .menu-left a, .menu-right a {
            text-decoration: none;
            color: #ffffff;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 0px;
            transition: color 0.3s ease-in-out;
        }

        .menu-left a:hover, .menu-right a:hover {
            color: #ff5800 !important;
        }

        .menu-left a:active, .menu-right a:active {
            text-decoration: none;
            color: #ffffff;
        }

        .menu-left a:visited, .menu-right a:visited {
            text-decoration: none;
            color: #ffffff;
        }

        .banner {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1920px;
            height: auto;
            z-index: -1;
        }

        .banner img {
            width: 100%;
            height: auto;
        }

        .section-title {
            margin: 20px;
            text-align: center;
            font-size: 30px;
            font-weight: bold;
        }

        /* 검색창과 제목을 묶는 컨테이너 */
        .search-container {
            position: absolute;
            top: 1200px; /* 위치 조정 */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 100%;
        }

        .title-1 {
            color: white;
            background: #ff5800; /* 주황색 배경 */
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px; /* 검색창과의 간격 조정 */
        }

        .search-form input {
            width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .search-form button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-form button:hover {
            background-color: #555;
        }

        .map {
            display: flex;
            justify-content: center;
            margin-top: 1300px;
            margin-bottom: 20px;
        }

        .map iframe {
            width: 90%;
            max-width: 1200px;
            height: 800px;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="menu-left">
            <a href="map.html">치킨 지도</a>
            <a href="recommend.html">치킨 순위</a>
        </div>
        <a href="index.html"><img src="static/schick_logo_temp_200.png" alt="로고" class="logo"></a>
        <div class="menu-right">
            <a href="game.html">치킨 게임</a>
            <a href="about.html">서울의닭 소개</a>
        </div>
    </header>

    <section class="banner">
        <img src="static/schick_main.gif" alt="메인 배너">
    </section>

    <!-- 검색창과 제목을 묶는 컨테이너 -->
    <div class="search-container">
        <div class="section-title title-1">▼나와 가까운 치킨집 찾아보기▼</div>
        <form action="/search" method="get" class="search-form">
            <input type="text" name="query" placeholder="치킨집을 검색해보세요! 예) 푸라닭 서초" required>
            <button type="submit">검색</button>
        </form>
    </div>

    <section class="map">
        <iframe src="seoul_business_map_공유용.html" title="치카 지도"></iframe>
    </section>
</body>
</html>
